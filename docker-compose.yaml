services:
  db:
    image: postgres:16-alpine
    container_name: 69-s2-db
    ports:
      - "5432:5432"

    environment:
      POSTGRES_PASSWORD: "bm123456"
      POSTGRES_USER: "bam"
      POSTGRES_DB: "bam"

  admin:
    image: dpage/pgadmin4
    container_name: 69-s2-admin
    ports:
      - "8082:80"

    environment:
      PGADMIN_DEFAULT_EMAIL: "bam@admin.com"
      PGADMIN_DEFAULT_PASSWORD: "bm123456"

    depends_on:
      - db
